<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <section class="profiles">
            <ul>
                <li class="profile">
                    <img src="/assets/perfil-1.jpg" alt="Close-up da personagem de 'As Branquelas' com uma expressão de nojo exagerada e um sorriso forçado, um meme clássico para quando algo é estranho ou 'cringe'.">
                    <p>Raquel</p>
                </li>
                <li class="profile">
                    <img src="/assets/perfil-2.jpg" alt="Close-up de Homer Simpson com uma expressão de choque e confusão, de olhos arregalados e boca aberta, ideal para representar momentos de 'percebi a besteira que fiz' ou surpresa total.">
                    <p>Andrew</p>
                </li>  <li class="profile">
                    <img src="/assets/perfil-3.jpg" alt="Close-up da personagem Mia Wallace, do filme 'Pulp Fiction', segurando um cigarro com um olhar melancólico e pensativo, ícone clássico de estética retrô e reações de desânimo ou reflexão.">
                    <p>Amélia</p>
                </li> <li class="profile">
                    <img src="/assets/perfil-4.jpg" alt="Bob Esponja, vestindo seu traje clássico, aparece sentado com uma expressão de tédio e julgamento enquanto toma uma bebida em um copo listrado, em uma imagem de baixa resolução com estética de meme.">
                    <p>David</p>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
